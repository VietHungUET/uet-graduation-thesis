# ============================================================
# CẤU HÌNH DOMAIN THEO LUẬN VĂN (Quy mô: 40 Process, 40 Mutex)
# Dành cho mô hình: DijkstraMutex_ExecutionTrace.use
# ============================================================

# 1. Khai báo dải số nguyên (Rất quan trọng cho Sequence.at(i))
# Bao phủ dải index từ 0 đến 39 (size - 1)
Integer_min = -1
Integer_max = 40

# 2. Khai báo số lượng đối tượng cơ sở (Class Bounds)
Process_min = 40
Process_max = 40

Mutex_min = 40
Mutex_max = 40

State_min = 40
State_max = 40

# 3. Kích thước tập đối tượng trạng thái (State Record Classes)
Hold_min = 0
Hold_max = 120

WaitQueue_min = 0
WaitQueue_max = 120

# 4. Kích thước của mảng Sequence (Queue)
# Cú pháp: <Class>_<Attribute>_minSize/maxSize
# Hàng đợi có thể rỗng (0) hoặc chứa toàn bộ 40 process (40)
WaitQueue_queue_minSize = 0
WaitQueue_queue_maxSize = 40

# 5. Số lượng liên kết của biểu đồ đối tượng (Association Bounds)
# Nối 40 đối tượng thành một chuỗi (Chain) cần 39 liên kết.
StateTrace_min = 0
StateTrace_max = 39

MutexHierarchy_min = 0
MutexHierarchy_max = 39

# ============================================================
# KÍCH HOẠT CÁC RÀNG BUỘC (INVARIANTS)
# ============================================================

# Loại trừ lẫn nhau
State_MutualExclusion = active

# Toàn vẹn hàng đợi
WaitQueue_UniqueQueuePerMutexState = active
WaitQueue_NoDuplicateInQueue = active
WaitQueue_HoldNotWaiting = active

# Luật chống Deadlock và Cấp phát
WaitQueue_DijkstraHierarchyRule = active
WaitQueue_StrictPriorityGrant = active
