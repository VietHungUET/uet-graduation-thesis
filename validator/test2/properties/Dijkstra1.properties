# ============================================================
# Cau hinh thu gon - n = 10 Process
# Du de chung minh UNSAT
# (ForceDeadlock <-> HoldNotWaiting contradiction)
# ============================================================

# 1. Dai so nguyen
# Queue maxSize = 10 -> can chi so 1..10
Integer_min = -1
Integer_max = 12

# 2. So luong doi tuong co so
# n = 10 tien trinh
Process_min = 10
Process_max = 10

# Dung 10 mutex tuong ung voi quy mo 10 tien trinh
Mutex_min = 10
Mutex_max = 10

# Giu 2 trang thai de van co the xet chuyen trang thai
State_min = 2
State_max = 2

# 3. Record Classes
# Cho phep toi da 10 ban ghi giu khoa
Hold_min = 0
Hold_max = 3

# Co the co toi da 10 hang doi, tuong ung voi 10 mutex
WaitQueue_min = 1
WaitQueue_max = 10

# 4. Queue size
# It nhat 1 phan tu de ForceDeadlock kich hoat
# Toi da 10 phan tu theo so luong Process
WaitQueue_queue_minSize = 1
WaitQueue_queue_maxSize = 10

# 5. Association Bounds
# Voi 2 State, so lien ket vet thuc thi khong can lon
StateTrace_min = 0
StateTrace_max = 2

# Voi 10 Mutex, cho phep hinh thanh chuoi phan cap tai nguyen
MutexHierarchy_min = 0
MutexHierarchy_max = 10

# ============================================================
# Kich hoat cac rang buoc (INVARIANTS)
# ============================================================

State_MutualExclusion = active

WaitQueue_UniqueQueuePerMutexState = active
WaitQueue_NoDuplicateInQueue = active
WaitQueue_HoldNotWaiting = active

WaitQueue_DijkstraHierarchyRule = active
WaitQueue_StrictPriorityGrant = active

WaitQueue_EmptyQueueImpliesNoNewGrant = active

WaitQueue_ForceDeadlock = active
